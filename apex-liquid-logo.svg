<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 230 178" role="img" aria-label="Apex Auto liquid glass triangle logo">
  <defs>
    <filter id="markShadow" x="-30%" y="-35%" width="160%" height="185%">
      <feDropShadow dx="0" dy="18" stdDeviation="13" flood-color="#0f172a" flood-opacity=".22"/>
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#ed0012" flood-opacity=".20"/>
    </filter>
    <filter id="blur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.4"/>
    </filter>

    <linearGradient id="leftGlass" x1="28" y1="148" x2="103" y2="18" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#8391a4" stop-opacity=".24"/>
      <stop offset=".20" stop-color="#ffffff" stop-opacity=".74"/>
      <stop offset=".48" stop-color="#dbe3ee" stop-opacity=".42"/>
      <stop offset=".76" stop-color="#ffffff" stop-opacity=".88"/>
      <stop offset="1" stop-color="#8d99aa" stop-opacity=".34"/>
    </linearGradient>
    <linearGradient id="leftDepth" x1="62" y1="145" x2="112" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a" stop-opacity=".18"/>
      <stop offset=".42" stop-color="#ffffff" stop-opacity=".16"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".50"/>
    </linearGradient>
    <linearGradient id="redGlass" x1="135" y1="32" x2="196" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ff4a56"/>
      <stop offset=".24" stop-color="#ff0015"/>
      <stop offset=".72" stop-color="#e60013"/>
      <stop offset="1" stop-color="#9f000d"/>
    </linearGradient>
    <linearGradient id="redDepth" x1="129" y1="55" x2="184" y2="151" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".36"/>
      <stop offset=".48" stop-color="#ffffff" stop-opacity=".04"/>
      <stop offset="1" stop-color="#2b0004" stop-opacity=".24"/>
    </linearGradient>
    <linearGradient id="topCap" x1="106" y1="14" x2="139" y2="60" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".78"/>
      <stop offset=".42" stop-color="#cbd5e1" stop-opacity=".40"/>
      <stop offset="1" stop-color="#111827" stop-opacity=".22"/>
    </linearGradient>
    <linearGradient id="baseGlass" x1="71" y1="145" x2="168" y2="145" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#9ca3af" stop-opacity=".30"/>
      <stop offset=".22" stop-color="#111827" stop-opacity=".78"/>
      <stop offset=".58" stop-color="#020617" stop-opacity=".96"/>
      <stop offset=".82" stop-color="#1f2937" stop-opacity=".88"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity=".16"/>
    </linearGradient>
    <radialGradient id="redGlow" cx="70%" cy="86%" r="48%">
      <stop offset="0" stop-color="#ff2d38" stop-opacity=".36"/>
      <stop offset=".55" stop-color="#ff2d38" stop-opacity=".10"/>
      <stop offset="1" stop-color="#ff2d38" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <ellipse cx="116" cy="154" rx="84" ry="14" fill="#0f172a" opacity=".13" filter="url(#blur)"/>
  <ellipse cx="150" cy="151" rx="62" ry="18" fill="url(#redGlow)" opacity=".95"/>

  <g filter="url(#markShadow)">
    <path d="M116 12 20 151h48l60-92-10-47Z" fill="url(#leftGlass)"/>
    <path d="M116 12 128 59 68 151H47L116 34Z" fill="url(#leftDepth)"/>
    <path d="M118 13 142 28 128 59Z" fill="url(#topCap)"/>
    <path d="M33 144 110 24" fill="none" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" opacity=".62"/>
    <path d="M58 137 121 40" fill="none" stroke="#0f172a" stroke-width="2" stroke-linecap="round" opacity=".16"/>

    <path d="M128 59 175 151h49L142 28Z" fill="url(#redGlass)"/>
    <path d="M142 28 128 59 175 151h20Z" fill="url(#redDepth)"/>
    <path d="M146 38 212 144" fill="none" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity=".30"/>
    <path d="M133 64 178 144" fill="none" stroke="#ff8590" stroke-width="1.8" stroke-linecap="round" opacity=".30"/>

    <path d="M100 112 70 151h100l-26-39-17 24H86z" fill="url(#baseGlass)"/>
    <path d="M82 145h78" stroke="#ffffff" stroke-width="2.2" stroke-linecap="round" opacity=".34"/>
    <path d="M96 118 84 138h43l16-22-16 19H98z" fill="#ffffff" opacity=".10"/>
  </g>

  <path d="M116 12 20 151h48l32-39h44l31 39h49L142 28l-14 31-12-47Z" fill="none" stroke="#ffffff" stroke-width="2.2" opacity=".50"/>
  <path d="M116 12 20 151h48l32-39h44l31 39h49" fill="none" stroke="#7f8a9a" stroke-width="1.2" opacity=".28"/>
</svg>
